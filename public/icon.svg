<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- App icon: mosque + crescent on the app's warm ink background.
       Safe-zone friendly (maskable) — key art kept within the center. -->
  <rect width="512" height="512" rx="96" fill="#1E1810"/>
  <circle cx="256" cy="248" r="180" fill="#243D2C"/>

  <!-- crescent -->
  <g>
    <circle cx="356" cy="150" r="34" fill="#F5B841"/>
    <circle cx="370" cy="140" r="28" fill="#243D2C"/>
  </g>

  <!-- minarets -->
  <g fill="#5A8465">
    <rect x="150" y="235" width="20" height="150" rx="6"/>
    <path d="M160 205 L176 235 L144 235 Z"/>
    <circle cx="160" cy="200" r="9" fill="#F5B841"/>
    <rect x="342" y="235" width="20" height="150" rx="6"/>
    <path d="M352 205 L368 235 L336 235 Z"/>
    <circle cx="352" cy="200" r="9" fill="#F5B841"/>
  </g>

  <!-- main building + dome -->
  <rect x="196" y="270" width="120" height="115" rx="6" fill="#456B4F"/>
  <path d="M196 270 Q256 175 316 270 Z" fill="#5A8465"/>
  <rect x="252" y="150" width="8" height="26" fill="#F5B841"/>
  <circle cx="256" cy="146" r="9" fill="#F5B841"/>

  <!-- arched door -->
  <path d="M232 385 L232 335 Q256 305 280 335 L280 385 Z" fill="#1E1810"/>

  <!-- ground -->
  <rect x="130" y="382" width="252" height="10" rx="5" fill="#3D3428"/>
</svg>
